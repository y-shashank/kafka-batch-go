# Example kbatch daemon config.
# Copy to your app as config/daemon.yml (or config/kbatch_daemon.yml) and adjust.
#
# ── Environment overrides (applied on top of YAML when set) ───────────────────
#   KAFKA_BROKERS                              comma-separated broker list
#   KAFKA_PREFIX                               topic + consumer_group prefix
#   REDIS_URL                                  Redis connection URL
#   KAFKA_BATCH_HANDLER_MANIFEST               path to kafka_batch_handlers.yml
#   KAFKA_BATCH_SCHEDULE_MYSQL_DSN             when schedule_store is mysql
#   KAFKA_BATCH_STORE_MYSQL_DSN                failures / pause MySQL DSN
#   KAFKA_BATCH_PRIORITY_CONFIG                single priority YAML path
#   KAFKA_BATCH_PRIORITY_CONFIGS               comma-separated priority YAML paths
#   KAFKA_BATCH_METRICS_ENABLED                1 | true
#   KAFKA_BATCH_METRICS_PREFIX
#   KAFKA_BATCH_METRICS_STATSD_ADDR
#   KAFKA_BATCH_LIVENESS_ENABLED               1 | true
#   KAFKA_BATCH_LIVENESS_HTTP_ADDR
#   KAFKA_BATCH_EVENTS_CONSUMER_CONCURRENCY
#   KAFKA_BATCH_RETRY_CONSUMER_CONCURRENCY
#   KAFKA_BATCH_RETRY_MAX_PAUSE                seconds
#   KAFKA_BATCH_PRODUCER_REQUIRED_ACKS         all_isr | leader
#   KAFKA_BATCH_JOBS_CONSUMER_CONCURRENCY      worker only
#   KAFKA_BATCH_FAIR_READY_CONSUMER_CONCURRENCY worker only
#   KAFKA_BATCH_PRIORITY_CONSUMER_CONCURRENCY  worker only
#   KAFKA_BATCH_SUPER_FETCH_CONCURRENCY        worker only
#   KAFKA_BATCH_CONSUMER_FETCH_MAX_BYTES
#   KAFKA_BATCH_CONSUMER_FETCH_MAX_PARTITION_BYTES
#   KAFKA_BATCH_CONSUMER_FETCH_MAX_WAIT_MS
#
# Env interpolation: any value may use ${VAR} or ${VAR:-default}, e.g.:
#   redis_url: ${REDIS_URL:-redis://localhost:6379/0}
#   schedule_mysql_dsn: ${KB_MYSQL_URL}
#   store_mysql_dsn: ${KB_MYSQL_URL}

# ── Kafka & identity ──────────────────────────────────────────────────────────

brokers:
  - localhost:9092

# Optional namespace — prefixes topics and consumer_group (e.g. mothership.kafka_batch.events)
# topic_prefix: mothership

consumer_group: kafka-batch

# Stable per-replica id for transactional retry producer fencing (default: hostname).
# Set explicitly when multiple processes share a host.
# node_id: pod-abc123

handler_manifest: config/kafka_batch_handlers.yml

# Explicit Go job topics for schedule routing / lag UI; usually derived from handler manifest.
# jobs_topics:
#   - kafka_batch.jobs
#   - segment.exports

redis_url: ${REDIS_URL:-redis://localhost:6379/0}

# ── Core topics ───────────────────────────────────────────────────────────────

events_topic: kafka_batch.events
callbacks_topic: kafka_batch.callbacks
dead_letter_topic: kafka_batch.dead_letter
retry_topic: kafka_batch.jobs.retry

# ── Job retry policy (used when Go job processor schedules failures) ────────────

max_retries: 7
retry_tiers:                         # tier => delay seconds (topics: retry.{tier})
  short: 30
  medium: 420
  large: 1200

# retry_max_pause: 30                # sec — max sleep before re-checking not-yet-due retry (Ruby: retry_max_pause_seconds)

# ── Control-plane consumer throughput (daemon pod) ────────────────────────────
# Each control-plane group runs exactly ONE franz-go client (one group member) per
# daemon pod. The events consumer fans records out to one goroutine per assigned
# partition, so a single client parallelizes across all partitions it owns while keeping
# per-partition ordering. Scale throughput by adding daemon *pods* (Kafka splits the
# partitions across them) and/or by adding partitions to the events/retry topics — not
# by in-process members. There are no *_consumer_concurrency knobs anymore.
# consumer_stall_timeout: 90       # sec — force reconnect when poll loop makes no progress
# producer_required_acks: all_isr  # all_isr (default) | leader

# Consumer fetch tuning (daemon + worker consumers)
# consumer_fetch_max_bytes: 1048576           # 1 MiB total per broker fetch (default)
# consumer_fetch_max_partition_bytes: 131072  # 128 KiB per partition (default)
# consumer_fetch_max_wait_ms: 200             # max broker wait before partial fetch (default)

# ── Worker throughput (kbatch worker only — listed here for one-file reference) ─
jobs_consumer_concurrency: 8
# fair_ready_consumer_concurrency: 8
# priority_consumer_concurrency: 4
# super_fetch_concurrency: 32               # in-flight #perform pool per member

# ── Delayed jobs — perform_in / perform_at (daemon only) ─────────────────────

schedule_poller_enabled: true
scheduled_topic: kafka_batch.scheduled
schedule_store: redis                  # redis | mysql
# schedule_mysql_dsn: ${KB_MYSQL_URL}  # required when schedule_store: mysql
# schedule_poll_interval: 5              # sec — base poll cadence while work is flowing
# schedule_poll_max_interval: 60       # sec — idle backoff cap (exponential)
# schedule_poll_jitter: 0.1            # ±fraction on sleep to de-sync pods (0 disables)
# schedule_batch_size: 100             # max due jobs claimed per poll (SQL LIMIT)
# schedule_lease_seconds: 60             # lease TTL on a claimed schedule pointer
# schedule_reclaim_interval: 30        # sec — how often to reclaim expired leases

# ── Priority YAML groups (daemon schedule routing + worker execution) ─────────

# priority_config_paths:
#   - config/priority/jobs-fast.yml
#   - config/priority/jobs-slow.yml
# priority_lag_check_interval: 2         # sec — priority consumer lag re-check
# priority_weighted_interleave: 4      # weighted mode: 1-in-N lower-rank jobs

# ── Fairness dispatch (daemon only) ───────────────────────────────────────────

fairness_enabled: true

# Time lane (weighted wall-clock)
# fairness_time_ingest: kafka_batch.fair_time_ingest
# fairness_time_ready: kafka_batch.fair_time_ready           # legacy combined ready topic
# fairness_time_ready_go: kafka_batch.fair_time_ready.go
# fairness_time_ready_ruby: kafka_batch.fair_time_ready.ruby

# Throughput lane (weighted job count)
# fairness_throughput_ingest: kafka_batch.fair_throughput_ingest
# fairness_throughput_ready: kafka_batch.fair_throughput_ready
# fairness_throughput_ready_go: kafka_batch.fair_throughput_ready.go
# fairness_throughput_ready_ruby: kafka_batch.fair_throughput_ready.ruby

# fairness_ready_window: 100            # WFQ ready-topic scan window
# fairness_global_concurrency: 50       # in-flight window per lane
# fairness_max_inflight_per_tenant: 0   # hard per-tenant cap (0 = dynamic share only)
# fairness_lease_ttl: 1800              # sec — slot lease TTL (must exceed max job runtime)
# fairness_default_weight: 1.0
# fairness_weighted_concurrency: true   # false = equal cap per active tenant
# fairness_active_count_ttl: 5          # sec — in-flight count cache TTL
# fairness_active_count_source: inflight_plus_ready   # inflight_plus_ready | inflight
# fairness_tenant_partition_cache_ttl: 30  # sec — in-process tenant→partition cache
# fairness_dynamic_tenant_partitions: false
# fairness_tenant_partitions:             # pin tenants to ingest partitions
#   acme: 0
#   globex: 1

# ── Consumption pause/resume (/lag UI) ────────────────────────────────────────
# Go consumers mirror killswitch state via franz-go PauseFetchTopics/Partitions so
# paused topics do not advance offsets (Ruby ConsumptionGate parity).

# consumption_control_refresh_interval: 30   # sec — how often consumers re-read pause state

# ── Batch store / failures (daemon + worker) ──────────────────────────────────

# store: redis                         # redis (default) | mysql
# store_mysql_dsn: ${KB_MYSQL_URL}    # required when store: mysql (failures + pause tables)

# skip_cancelled_jobs: true             # drop schedule dispatches for cancelled batches (default true; code default only — not YAML-loaded today)

# ── Reconciler (daemon — triggered from events consumer) ──────────────────────
# Recovers stuck running batches and re-fires lost callbacks. Manual run:
#   kbatch reconcile --config config/daemon.yml

# reconciliation_interval: 300         # sec — sweep interval + staleness threshold
# reconciler_lock_ttl: 600             # sec — Redis lock TTL if reconciler crashes
# max_reconcile_per_run: 100           # max stuck-running + lost-callback batches per sweep

# ── Liveness HTTP (daemon health) ─────────────────────────────────────────────

# liveness_enabled: true
# liveness_http_addr: ":8080"
# liveness_ttl: 180                    # sec — Redis TTL on live:consumer:* (≈9× heartbeat interval)
# liveness_heartbeat_interval: 20      # sec — background heartbeat refresh interval
# super_fetch_orphan_grace: 40         # sec — missing heartbeat must outlive this before reclaim/steal
# track_running_jobs: true             # per-job /live writes (false = heartbeats only)

# ── Metrics (daemon + worker) ─────────────────────────────────────────────────

# metrics_enabled: false
# metrics_prefix: kafka_batch
# metrics_statsd_addr: localhost:8125

# ── Code defaults not exposed in YAML (change requires code / future YAML keys) ─
# retry_jitter: 0.1                    # unused in Go retry scheduling today
# batch_ttl: 604800                    # sec — Redis batch hash TTL (7 days)
# event_emit_retries: 3
# event_emit_backoff: 1                # sec
