# Example kbatch daemon config (Phase 3).
# Copy to your app as config/kbatch_daemon.yml and adjust.
#
# Environment overrides (applied on top of YAML when set):
#   KAFKA_BROKERS              comma-separated broker list
#   KAFKA_PREFIX               topic + consumer_group prefix
#   REDIS_URL                  Redis connection URL
#   KAFKA_BATCH_HANDLER_MANIFEST  path to kafka_batch_handlers.yml
#   KAFKA_BATCH_SCHEDULE_MYSQL_DSN  when schedule_store is mysql
#   KAFKA_BATCH_PRIORITY_CONFIG(S)  priority YAML path(s) — daemon/worker only
#   KAFKA_BATCH_STORE_MYSQL_DSN     batch failures / pause MySQL — daemon/worker only
#     Both MYSQL_DSN vars accept a go-sql-driver DSN
#       user:pass@tcp(host:3306)/db?parseTime=true&loc=UTC
#     or a Rails-style URL
#       mysql2://user:pass@host:3306/db?parseTime=true&loc=UTC
#   KAFKA_BATCH_METRICS_*           metrics — daemon/worker only
#   KAFKA_BATCH_LIVENESS_*          health HTTP — daemon/worker only
#
# Env interpolation: any value may reference an env var with ${VAR} or
# ${VAR:-default}. One variable can then feed the client, control, and
# execution roles — e.g. set KB_MYSQL_URL once and point both DSN keys at it:
#   schedule_mysql_dsn: ${KB_MYSQL_URL}
#   store_mysql_dsn:    ${KB_MYSQL_URL}
# (A bare $VAR is left untouched so a literal '$' in a password survives.)

brokers:
  - localhost:9092

# Optional — when set, prefixes events/callbacks/retry topics and consumer_group
# topic_prefix: mothership

consumer_group: kafka-batch

# Optional explicit job topics; when omitted, derived from handler manifest Go topics
# jobs_topics:
#   - kafka_batch.jobs
#   - segment.exports

handler_manifest: config/kafka_batch_handlers.yml

events_topic: kafka_batch.events
callbacks_topic: kafka_batch.callbacks
dead_letter_topic: kafka_batch.dead_letter
retry_topic: kafka_batch.jobs.retry

# Env interpolation in action: use REDIS_URL if set, else fall back to localhost.
redis_url: ${REDIS_URL:-redis://localhost:6379/0}

max_retries: 7

# Phase 3 — control-plane throughput (single pod, multi-partition topics)
# In-process Kafka group members split partition assignment across goroutines.
# With 32 events partitions, set events_consumer_concurrency up to 32.
# events_consumer_concurrency: 8
# retry_consumer_concurrency: 4
# producer_required_acks: all_isr   # all_isr (default) | leader

# kbatch worker throughput (single pod, multi-partition job topics)
# jobs_consumer_concurrency: 32        # plain go job topics — match partition count
# fair_ready_consumer_concurrency: 32  # per fair-ready lane (time / throughput)
# priority_consumer_concurrency: 8     # per priority YAML group
# job_process_concurrency: 1           # parallel jobs per poll per member (Karafka concurrency); try 4–8 for CPU-bound handlers

# Consumer fetch fairness (daemon + worker consumers; tighter than franz-go defaults)
# consumer_fetch_max_bytes: 1048576          # 1 MiB total per broker fetch (default)
# consumer_fetch_max_partition_bytes: 131072 # 128 KiB per partition (default)
# consumer_fetch_max_wait_ms: 200            # max broker wait before partial fetch (default)

# Phase 3b — delayed jobs (perform_in / perform_at). Runs on control only.
# Enable both keys for hybrid setups using MySQL schedule index (Ruby gem default).
schedule_poller_enabled: true
scheduled_topic: kafka_batch.scheduled
schedule_store: redis                  # redis (default) | mysql
# schedule_mysql_dsn: ${KB_MYSQL_URL}  # required when schedule_store: mysql
# schedule_poll_interval: 5              # sec   — base poll cadence while jobs are flowing
# schedule_poll_max_interval: 60         # sec   — cap for exponential backoff while idle
# schedule_poll_jitter: 0.1              # ±frac — jitter on the sleep so pods de-sync (0 disables)
# schedule_batch_size: 100               # int   — max due jobs claimed (query LIMIT) per poll
# schedule_lease_seconds: 60             # sec   — lease TTL on a claimed job pointer
# schedule_reclaim_interval: 30          # sec   — how often to reclaim expired leases

# Priority YAML groups (one file per consumer group suffix)
# priority_config_paths:
#   - config/priority.example.yml
# priority_lag_check_interval: 2
# priority_weighted_interleave: 4

# Phase 3c — fairness time lane (ingest → WFQ → ready.go / ready.ruby → perform)
fairness_enabled: true
# fairness_time_ingest: kafka_batch.fair_time_ingest
# fairness_time_ready_go: kafka_batch.fair_time_ready.go
# fairness_time_ready_ruby: kafka_batch.fair_time_ready.ruby
# fairness_throughput_ready_go: kafka_batch.fair_throughput_ready.go
# fairness_throughput_ready_ruby: kafka_batch.fair_throughput_ready.ruby
# fairness_global_concurrency: 50
# fairness_lease_ttl: 1800

retry_tiers:
  short: 30
  medium: 420
  large: 1200

# HTTP health — consumer poll activity; K8s liveness/readiness should hit /health
# liveness_enabled: true
# liveness_http_addr: ":8080"
# liveness_ttl: 30s
