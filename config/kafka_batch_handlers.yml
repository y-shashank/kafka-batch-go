# Shared handler manifest (Ruby kafka-batch gem + kafka-batch-go).
# One Kafka topic = one runtime. Fair jobs use shared ingest; control forwards to .go / .ruby ready.
#
# Per-handler fields (all optional except runtime; worker_class required for ruby):
#   runtime            go | ruby
#   worker_class       Ruby constant (runtime: ruby)
#   topic              plain-job topic (default: kafka_batch.jobs)
#   apply_topic_prefix true → prepend daemon topic_prefix (default: false)
#   max_retries        override daemon max_retries
#   retry_tier         short | medium | large
#   fairness_type      time | throughput (fair lane — no plain topic)
#   uniq               fingerprint dedupe (default: false)
#
# Full annotated copy: see README appendix "Full kafka_batch_handlers.yml".

handlers:
  segment.export:
    runtime: go
    topic: segment.exports
    max_retries: 5

  orders.process:
    runtime: ruby
    worker_class: Orders::ProcessWorker
    topic: kafka_batch.jobs.ruby

  campaigns.dispatch:
    runtime: go
    topic: campaigns.jobs
    fairness_type: time
    max_retries: 3

  segments.recompute:
    runtime: ruby
    worker_class: Segments::RecomputeWorker
    topic: kafka_batch.jobs.ruby
    fairness_type: time

  bulk.export:
    runtime: go
    topic: bulk.exports
    fairness_type: throughput
